<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Level 1 Cinematic Background</title>
  <style>
    :root {
      color-scheme: dark;
      --shadow: rgba(2, 3, 2, 0.72);
      --gold: rgba(223, 184, 103, 0.42);
      --bright-gold: #f4d991;
      --deep-gold: #8f6828;
      --approach-duration: 22s;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050604;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 48%, transparent 0 38%, rgba(0, 0, 0, 0.22) 62%, rgba(0, 0, 0, 0.64) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.45), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.45));
      mix-blend-mode: multiply;
    }

    body::after {
      background:
        radial-gradient(circle at 51% 49%, rgba(255, 205, 102, 0.11), transparent 28%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.25), transparent 24%, rgba(0, 0, 0, 0.58));
    }

    body.awaiting-start .intro,
    body.awaiting-start .intro::before,
    body.awaiting-start .intro-title,
    body.awaiting-start .stage,
    body.awaiting-start .scene {
      animation-play-state: paused;
    }

    .sound-gate {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 46%, rgba(133, 83, 18, 0.2), transparent 24%),
        #000;
      opacity: 1;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }

    .sound-gate.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-temple {
      display: grid;
      gap: 12px;
      justify-items: center;
      border: 0;
      color: rgba(246, 218, 150, 0.9);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      cursor: pointer;
      text-shadow: 0 0 18px rgba(224, 169, 83, 0.36), 0 0 30px rgba(0, 0, 0, 0.9);
    }

    .enter-temple::before {
      content: "";
      width: 34px;
      height: 34px;
      border: 1px solid rgba(245, 209, 132, 0.76);
      transform: rotate(45deg);
      box-shadow: 0 0 20px rgba(238, 190, 91, 0.34);
      animation: runePulseOnly 1.8s ease-in-out infinite;
    }

    .enter-temple span {
      font-size: clamp(20px, 2vw, 30px);
      letter-spacing: 0.08em;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #050604;
      opacity: 0;
      animation: revealStage 1.8s ease 5.7s forwards;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.02);
      transform-origin: 50% 50%;
      filter: saturate(1.08) contrast(1.06) brightness(0.92);
      animation: slowApproach var(--approach-duration) cubic-bezier(0.16, 0.74, 0.24, 1) forwards;
      will-change: transform;
    }

    body.preview .scene {
      animation-duration: 6s;
    }

    .breath {
      position: fixed;
      inset: -10%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 44%, rgba(220, 180, 104, 0.08), transparent 18%),
        radial-gradient(circle at 22% 76%, rgba(61, 102, 66, 0.08), transparent 18%);
      opacity: 0.58;
      animation: lightPulse 7s ease-in-out infinite alternate;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: overlay;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(111, 68, 15, 0.3), transparent 26%),
        radial-gradient(circle at 50% 52%, rgba(255, 207, 119, 0.08), transparent 18%),
        #000;
      animation: introOut 1.4s ease 5.1s forwards;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 32% 44%, rgba(255, 179, 73, 0.14), transparent 13%),
        radial-gradient(circle at 68% 58%, rgba(255, 210, 128, 0.1), transparent 14%);
      filter: blur(18px);
      opacity: 0;
      animation: emberGlow 4s ease forwards;
    }

    .intro-title {
      position: relative;
      display: grid;
      justify-items: center;
      gap: clamp(2px, 0.6vw, 8px);
      width: min(720px, 74vw);
      color: #f8e0a0;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      text-align: center;
      text-transform: none;
      opacity: 0;
      transform: scale(0.94);
      filter: brightness(0.8);
      animation: titleFlash 4.6s ease forwards;
    }

    .intro-title .fragments {
      font-size: clamp(36px, 5vw, 78px);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .intro-title .of {
      display: grid;
      grid-template-columns: minmax(52px, 1fr) auto minmax(52px, 1fr);
      align-items: center;
      gap: clamp(18px, 2.6vw, 34px);
      width: min(430px, 48vw);
      margin: clamp(6px, 0.9vw, 14px) 0 clamp(2px, 0.5vw, 8px);
      font-size: clamp(20px, 2.2vw, 34px);
      font-weight: 400;
      font-style: italic;
      line-height: 1;
      color: #f2cf86;
    }

    .intro-title .of::before,
    .intro-title .of::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 205, 126, 0.92), transparent);
      box-shadow: 0 0 12px rgba(255, 205, 111, 0.56);
    }

    .intro-title .aether {
      font-size: clamp(54px, 7.4vw, 116px);
      line-height: 0.9;
      font-weight: 400;
      letter-spacing: 0.035em;
    }

    .intro-title span {
      background:
        linear-gradient(180deg, #fff6cb 0%, #f4d28a 30%, #b27727 54%, #fff0b7 72%, #8c5e20 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 0.32px rgba(76, 45, 10, 0.62);
      text-shadow:
        0 1px 0 rgba(255, 246, 202, 0.58),
        0 0 18px rgba(255, 215, 127, 0.48),
        0 0 46px rgba(108, 59, 9, 0.7);
    }

    .intro-title::after {
      content: "";
      width: min(300px, 34vw);
      height: 1px;
      margin-top: clamp(18px, 2vw, 28px);
      background: linear-gradient(90deg, transparent, rgba(255, 225, 149, 0.9), transparent);
      box-shadow: 0 0 14px rgba(255, 208, 111, 0.62);
    }

    .temple-trigger {
      position: fixed;
      left: 50%;
      top: 48%;
      z-index: 5;
      width: 58px;
      height: 58px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 243, 201, 1) 0 5%, rgba(239, 192, 95, 0.72) 6% 15%, transparent 16%),
        conic-gradient(from 45deg, transparent, rgba(246, 213, 137, 0.8), transparent, rgba(255, 239, 185, 0.7), transparent);
      box-shadow:
        0 0 16px rgba(255, 221, 145, 0.7),
        0 0 42px rgba(202, 145, 55, 0.5),
        0 0 88px rgba(170, 111, 28, 0.26);
      cursor: pointer;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.68);
      pointer-events: none;
    }

    .temple-trigger::before,
    .temple-trigger::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255, 226, 157, 0.72);
      transform: rotate(45deg);
    }

    .temple-trigger::after {
      inset: 15px;
      border-color: rgba(255, 244, 205, 0.82);
      box-shadow: 0 0 16px rgba(255, 220, 134, 0.55);
    }

    .temple-trigger:hover,
    .temple-trigger:focus-visible {
      outline: 0;
      box-shadow:
        0 0 18px rgba(255, 225, 151, 0.82),
        0 0 52px rgba(218, 157, 62, 0.52);
    }

    .temple-trigger.is-ready {
      pointer-events: auto;
      animation: revealTrigger 1.5s ease forwards, runePulse 1.85s ease-in-out 1.4s infinite;
    }

    .temple-trigger.is-hidden {
      pointer-events: none;
      animation: triggerOut 0.5s ease forwards;
    }

    .prophecy {
      position: fixed;
      left: 50%;
      top: 52%;
      z-index: 6;
      width: min(720px, calc(100vw - 120px));
      margin: 0;
      padding: 0;
      border: 0;
      color: var(--bright-gold);
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(22px, 2.6vw, 42px);
      font-weight: 700;
      line-height: 1.12;
      text-align: center;
      letter-spacing: 0;
      text-wrap: balance;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -46%) scale(0.96);
      text-shadow:
        0 1px 0 #fff0b6,
        0 2px 0 var(--deep-gold),
        0 0 16px rgba(255, 222, 139, 0.55),
        0 0 38px rgba(83, 46, 8, 0.96),
        0 8px 24px rgba(0, 0, 0, 0.82);
      -webkit-text-stroke: 0.45px rgba(91, 59, 19, 0.68);
    }

    .prophecy.is-visible {
      animation: prophecyIn 1.2s cubic-bezier(0.18, 0.86, 0.24, 1) forwards, goldShimmer 3.4s ease-in-out 1.1s infinite;
    }

    .prophecy.is-receding {
      animation: prophecyRecede 1s ease forwards;
    }

    .trials-panel {
      position: fixed;
      left: 50%;
      top: 58%;
      z-index: 7;
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 1fr));
      gap: clamp(28px, 5vw, 86px);
      width: min(940px, calc(100vw - 120px));
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -42%) scale(0.98);
    }

    .trials-panel.is-visible {
      pointer-events: auto;
      animation: trialsIn 1.1s cubic-bezier(0.18, 0.86, 0.24, 1) forwards;
    }

    .trials-panel.is-leaving {
      pointer-events: none;
      animation: trialsOut 0.75s ease forwards;
    }

    .trial-entry {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 18px;
      min-height: 186px;
      padding: 18px 8px 0;
      border: 0;
      color: rgba(249, 223, 156, 0.92);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(18px);
    }

    .trials-panel.is-visible .trial-entry {
      animation: trialEntryIn 0.9s ease forwards;
    }

    .trials-panel.is-visible .trial-entry:nth-child(2) {
      animation-delay: 0.16s;
    }

    .trials-panel.is-visible .trial-entry:nth-child(3) {
      animation-delay: 0.32s;
    }

    .trial-entry::after {
      content: "";
      width: min(160px, 70%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(244, 205, 126, 0.78), transparent);
      box-shadow: 0 0 16px rgba(255, 210, 126, 0.38);
      transform: scaleX(0.72);
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0.72;
    }

    .trial-entry:hover::after,
    .trial-entry:focus-visible::after {
      transform: scaleX(1);
      opacity: 1;
    }

    .trial-entry:focus-visible {
      outline: 0;
    }

    .fragment {
      position: relative;
      width: 62px;
      height: 82px;
      filter: drop-shadow(0 0 16px rgba(255, 223, 146, 0.62)) drop-shadow(0 0 42px rgba(147, 215, 222, 0.24));
      animation: fragmentFloat 3.4s ease-in-out infinite;
    }

    .trial-entry:nth-child(2) .fragment {
      animation-delay: -0.8s;
    }

    .trial-entry:nth-child(3) .fragment {
      animation-delay: -1.5s;
    }

    .fragment::before,
    .fragment::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0, 92% 30%, 78% 100%, 50% 82%, 22% 100%, 8% 30%);
      background:
        linear-gradient(135deg, rgba(255, 250, 213, 0.94), rgba(245, 183, 80, 0.72) 37%, rgba(93, 202, 225, 0.52) 64%, rgba(255, 228, 145, 0.72)),
        radial-gradient(circle at 45% 20%, rgba(255, 255, 255, 0.92), transparent 20%);
      border: 1px solid rgba(255, 238, 182, 0.78);
    }

    .fragment::after {
      inset: 9px 12px;
      opacity: 0.75;
      clip-path: polygon(50% 0, 100% 38%, 72% 100%, 50% 72%, 28% 100%, 0 38%);
      background: linear-gradient(135deg, rgba(255, 255, 225, 0.76), rgba(255, 210, 118, 0.2), rgba(117, 220, 232, 0.5));
      mix-blend-mode: screen;
    }

    .trial-name {
      display: grid;
      gap: 7px;
      text-shadow:
        0 1px 0 rgba(255, 245, 199, 0.5),
        0 0 18px rgba(250, 210, 126, 0.38),
        0 0 34px rgba(0, 0, 0, 0.9);
    }

    .trial-name small {
      font-size: clamp(12px, 1vw, 14px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(236, 202, 130, 0.64);
    }

    .trial-name strong {
      font-size: clamp(24px, 2.6vw, 40px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .level-player {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      background: #020201;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .level-player.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .level-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: saturate(1.06) contrast(1.04) brightness(0.94);
    }

    .level-caption {
      position: fixed;
      left: clamp(34px, 4.4vw, 70px);
      bottom: clamp(28px, 4vw, 58px);
      z-index: 9;
      display: grid;
      gap: 7px;
      color: rgba(249, 225, 163, 0.9);
      font-family: Garamond, Georgia, "Times New Roman", serif;
      text-shadow: 0 0 22px rgba(0, 0, 0, 0.92), 0 0 18px rgba(224, 169, 83, 0.34);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.9s ease 0.45s, transform 0.9s ease 0.45s;
    }

    .level-player.is-visible .level-caption {
      opacity: 1;
      transform: translateY(0);
    }

    .level-caption small {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(231, 195, 124, 0.62);
    }

    .level-caption strong {
      font-size: clamp(30px, 4vw, 58px);
      font-weight: 400;
      line-height: 1;
    }

    .back-to-trials {
      position: fixed;
      right: clamp(28px, 3.5vw, 58px);
      top: clamp(24px, 3vw, 48px);
      z-index: 10;
      display: grid;
      grid-template-columns: 26px auto;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      border: 0;
      color: rgba(246, 219, 151, 0.86);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      font-size: 18px;
      letter-spacing: 0.03em;
      text-shadow: 0 0 14px rgba(0, 0, 0, 0.9), 0 0 16px rgba(240, 190, 94, 0.32);
      cursor: pointer;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.7s ease 0.8s, transform 0.7s ease 0.8s, color 0.25s ease;
    }

    .level-player.is-visible .back-to-trials {
      opacity: 1;
      transform: translateY(0);
    }

    .back-to-trials::before {
      content: "";
      width: 24px;
      height: 24px;
      border: 1px solid rgba(247, 217, 144, 0.72);
      transform: rotate(45deg);
      box-shadow: 0 0 16px rgba(238, 190, 91, 0.36);
    }

    .back-to-trials::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-left: 1px solid rgba(255, 239, 189, 0.92);
      border-bottom: 1px solid rgba(255, 239, 189, 0.92);
      transform: translateY(-50%) rotate(45deg);
    }

    .back-to-trials:hover,
    .back-to-trials:focus-visible {
      color: rgba(255, 239, 187, 1);
      outline: 0;
    }

    .demo-trigger {
      position: fixed;
      right: clamp(84px, 9vw, 150px);
      top: 50%;
      z-index: 10;
      display: grid;
      justify-items: center;
      gap: 13px;
      width: 130px;
      border: 0;
      color: rgba(235, 245, 255, 0.9);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-40%) scale(0.9);
      transition: opacity 0.75s ease, transform 0.75s ease, color 0.25s ease;
    }

    .demo-trigger.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1);
    }

    .demo-trigger::before {
      content: "";
      width: 54px;
      height: 54px;
      clip-path: polygon(50% 0, 100% 38%, 72% 100%, 50% 78%, 28% 100%, 0 38%);
      background:
        linear-gradient(135deg, rgba(236, 255, 255, 0.95), rgba(72, 220, 245, 0.72) 42%, rgba(17, 81, 132, 0.86) 100%),
        radial-gradient(circle at 34% 24%, rgba(255, 255, 255, 0.95), transparent 18%);
      box-shadow:
        0 0 18px rgba(119, 235, 255, 0.64),
        0 0 46px rgba(26, 138, 216, 0.4);
      animation: diamondPulse 1.9s ease-in-out infinite;
    }

    .demo-trigger span {
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0, 0, 0, 0.9), 0 0 18px rgba(86, 209, 255, 0.34);
    }

    .demo-trigger:hover,
    .demo-trigger:focus-visible {
      color: #fff;
      outline: 0;
    }

    .demo-trigger.is-cup {
      left: 58%;
      right: auto;
      top: 61%;
      width: 118px;
      color: rgba(255, 244, 214, 0.92);
    }

    .demo-trigger.is-cup::before {
      width: 62px;
      height: 76px;
      clip-path: none;
      background:
        radial-gradient(ellipse at 50% 20%, rgba(255, 239, 170, 0.96) 0 18%, rgba(132, 68, 17, 0.86) 44%, rgba(58, 25, 10, 0.72) 100%);
      clip-path: polygon(14% 0, 86% 0, 72% 42%, 58% 50%, 56% 74%, 76% 82%, 82% 100%, 18% 100%, 24% 82%, 44% 74%, 42% 50%, 28% 42%);
      box-shadow:
        inset 0 0 8px rgba(255, 255, 255, 0.24),
        inset 0 -10px 14px rgba(34, 13, 7, 0.46),
        0 0 18px rgba(255, 173, 66, 0.58),
        0 0 48px rgba(178, 85, 21, 0.38);
      animation: diamondPulse 1.9s ease-in-out infinite;
    }

    .demo-trigger.is-cup::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 16px;
      width: 46px;
      height: 20px;
      border-top: 2px solid rgba(255, 230, 160, 0.82);
      border-radius: 50%;
      box-shadow:
        0 17px 0 -14px rgba(255, 230, 160, 0.72),
        0 33px 0 -17px rgba(255, 209, 110, 0.55),
        0 58px 0 -18px rgba(255, 226, 154, 0.64);
      transform: translateX(-50%);
    }

    .mode-select {
      position: fixed;
      inset: 0;
      z-index: 11;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(47, 120, 166, 0.18), transparent 24%),
        radial-gradient(circle at 50% 58%, rgba(212, 159, 74, 0.08), transparent 22%),
        #000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.85s ease, visibility 0.85s ease;
    }

    .mode-select.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .mode-panel {
      display: grid;
      justify-items: center;
      gap: clamp(28px, 4vw, 50px);
      width: min(840px, calc(100vw - 96px));
      color: rgba(245, 231, 194, 0.95);
      font-family: Garamond, Georgia, "Times New Roman", serif;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.9s ease 0.25s, transform 0.9s ease 0.25s;
    }

    .mode-select.is-visible .mode-panel {
      opacity: 1;
      transform: translateY(0);
    }

    .mode-title {
      display: grid;
      gap: 10px;
    }

    .mode-title small {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(234, 198, 128, 0.58);
    }

    .mode-title strong {
      font-size: clamp(34px, 5vw, 72px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 24px rgba(255, 218, 143, 0.24),
        0 0 44px rgba(0, 0, 0, 0.95);
    }

    .mode-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(210px, 1fr));
      gap: clamp(22px, 4vw, 48px);
      width: 100%;
    }

    .mode-option {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 14px;
      min-height: 176px;
      padding: 24px 18px;
      border: 1px solid rgba(243, 210, 143, 0.28);
      color: rgba(246, 230, 190, 0.9);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015)),
        rgba(0, 0, 0, 0.14);
      font-family: Garamond, Georgia, "Times New Roman", serif;
      cursor: pointer;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .mode-option::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(105, 212, 244, 0.12);
      pointer-events: none;
    }

    .mode-option:hover,
    .mode-option:focus-visible {
      outline: 0;
      transform: translateY(-4px);
      border-color: rgba(246, 222, 159, 0.76);
      box-shadow:
        0 0 22px rgba(236, 183, 91, 0.18),
        0 0 46px rgba(78, 178, 236, 0.14);
    }

    .mode-icon {
      font-size: clamp(34px, 4vw, 54px);
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(139, 222, 255, 0.28));
    }

    .mode-option strong {
      font-size: clamp(25px, 2.6vw, 40px);
      font-weight: 400;
      line-height: 1;
    }

    .mode-option small {
      max-width: 250px;
      color: rgba(255, 255, 255, 0.58);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 13px;
      line-height: 1.45;
    }

    .mode-back {
      border: 0;
      color: rgba(246, 219, 151, 0.72);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.25s ease;
    }

    .mode-back:hover,
    .mode-back:focus-visible {
      color: rgba(255, 239, 187, 1);
      outline: 0;
    }

    .demo-player {
      position: fixed;
      inset: 0;
      z-index: 12;
      background: #000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.85s ease, visibility 0.85s ease;
    }

    .demo-player.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .demo-player::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 12;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.1s ease;
    }

    .demo-player.is-fading::after {
      opacity: 1;
    }

    .demo-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      filter: saturate(1.08) contrast(1.08) brightness(0.96);
    }

    .controls-hint {
      position: fixed;
      right: clamp(34px, 4vw, 72px);
      bottom: clamp(120px, 16vh, 190px);
      z-index: 13;
      display: grid;
      gap: 7px;
      padding: 10px 0 10px 16px;
      border-left: 1px solid rgba(255, 255, 255, 0.58);
      color: rgba(255, 255, 255, 0.96);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: clamp(14px, 1.12vw, 17px);
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: 0;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.22), transparent);
      text-shadow:
        0 1px 4px rgba(0, 0, 0, 0.95),
        0 0 18px rgba(255, 255, 255, 0.24);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 0.55s, transform 0.8s ease 0.55s;
    }

    .demo-player.is-visible .controls-hint {
      opacity: 1;
      transform: translateY(0);
    }

    .demo-back {
      position: fixed;
      right: clamp(28px, 3.5vw, 58px);
      top: clamp(24px, 3vw, 48px);
      z-index: 13;
      display: grid;
      grid-template-columns: 26px auto;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      border: 0;
      color: rgba(255, 255, 255, 0.82);
      background: transparent;
      font-family: Garamond, Georgia, "Times New Roman", serif;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.7s ease 0.8s, transform 0.7s ease 0.8s, color 0.25s ease;
    }

    .demo-player.is-visible .demo-back {
      opacity: 1;
      transform: translateY(0);
    }

    .demo-back::before {
      content: "";
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      transform: rotate(45deg);
      box-shadow: 0 0 16px rgba(120, 220, 255, 0.3);
    }

    .demo-back::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-left: 1px solid rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.92);
      transform: translateY(-50%) rotate(45deg);
    }

    .demo-back:hover,
    .demo-back:focus-visible {
      color: #fff;
      outline: 0;
    }

    @keyframes slowApproach {
      from {
        transform: scale(1.02);
      }
      to {
        transform: scale(1.17);
      }
    }

    @keyframes revealStage {
      to {
        opacity: 1;
      }
    }

    @keyframes introOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes emberGlow {
      0%,
      100% {
        opacity: 0;
      }
      16% {
        opacity: 0.78;
      }
      28% {
        opacity: 0.24;
      }
      42% {
        opacity: 0.9;
      }
      66% {
        opacity: 0.46;
      }
    }

    @keyframes titleFlash {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
        filter: brightness(0.3);
      }
      8% {
        opacity: 0.72;
        filter: brightness(1.26);
      }
      13% {
        opacity: 0.42;
        filter: brightness(0.72);
      }
      22% {
        opacity: 0.88;
        transform: translateY(0) scale(1);
        filter: brightness(1.18);
      }
      34% {
        opacity: 0.66;
        filter: brightness(0.9);
      }
      48%,
      82% {
        opacity: 0.94;
        transform: translateY(0) scale(1);
        filter: brightness(1.06);
      }
      100% {
        opacity: 0;
        transform: translateY(-8px) scale(1.015);
        filter: brightness(0.72);
      }
    }

    @keyframes lightPulse {
      from {
        opacity: 0.46;
        transform: scale(1);
      }
      to {
        opacity: 0.9;
        transform: scale(1.05);
      }
    }

    @keyframes revealTrigger {
      to {
        opacity: 0.86;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes runePulse {
      0%,
      100% {
        filter: brightness(0.95);
        transform: translate(-50%, -50%) scale(0.96);
      }
      50% {
        filter: brightness(1.38);
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes runePulseOnly {
      0%,
      100% {
        filter: brightness(0.95);
        transform: rotate(45deg) scale(0.96);
      }
      50% {
        filter: brightness(1.35);
        transform: rotate(45deg) scale(1.08);
      }
    }

    @keyframes diamondPulse {
      0%,
      100% {
        filter: brightness(0.92);
        transform: translateY(0) scale(0.96);
      }
      50% {
        filter: brightness(1.32);
        transform: translateY(-4px) scale(1.06);
      }
    }

    @keyframes triggerOut {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.8);
      }
    }

    @keyframes prophecyIn {
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes prophecyRecede {
      to {
        opacity: 0;
        transform: translate(-50%, -72%) scale(0.92);
        filter: blur(2px) brightness(0.75);
      }
    }

    @keyframes trialsIn {
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes trialsOut {
      to {
        opacity: 0;
        transform: translate(-50%, -55%) scale(0.96);
        filter: blur(2px);
      }
    }

    @keyframes trialEntryIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fragmentFloat {
      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
        filter: brightness(1);
      }
      50% {
        transform: translateY(-12px) rotate(2deg);
        filter: brightness(1.22);
      }
    }

    @keyframes goldShimmer {
      0%,
      100% {
        filter: brightness(0.98) saturate(1);
      }
      45% {
        filter: brightness(1.28) saturate(1.18);
      }
    }

    @media (max-aspect-ratio: 13 / 9) {
      .scene {
        object-fit: cover;
      }

      .trials-panel {
        width: min(680px, calc(100vw - 48px));
        gap: 18px;
      }
    }
  </style>
</head>
<body class="awaiting-start">
  <div class="sound-gate" aria-label="Start experience">
    <button class="enter-temple" type="button">
      <span>Enter the Temple</span>
    </button>
  </div>
  <div class="intro" aria-label="Fragments of Aether title">
    <h1 class="intro-title">
      <span class="fragments">Fragments</span>
      <span class="of">of</span>
      <span class="aether">Aether</span>
    </h1>
  </div>
  <main class="stage" aria-label="Level 1 cinematic background">
    <video class="scene" muted playsinline preload="auto" poster="temple_bg.jpg">
      <source src="Level1_20260606_01224452.mp4" type="video/mp4">
    </video>
    <audio class="logo-audio" preload="auto" src="logo_harp_sweep.wav"></audio>
    <audio class="temple-audio" preload="auto" src="temple_bgm.mp3"></audio>
    <audio class="rune-audio" preload="auto" src="rune_appear.mp3"></audio>
    <audio class="mode-audio" preload="auto" loop src="utopian_mode_bgm.mp3"></audio>
    <audio class="dungeon-audio" preload="auto" loop src="dungeon_quiet_bgm.wav"></audio>
    <div class="breath" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <button class="temple-trigger" type="button" aria-label="Reveal temple prophecy"></button>
    <p class="prophecy" aria-live="polite">You need to pass three trials to survive the temple.</p>
    <nav class="trials-panel" aria-label="Temple trials">
      <button class="trial-entry" type="button" data-level-src="Level4_20260607_01491548.mp4" data-level-kicker="Level 4" data-level-title="Just Eat" data-after="diamond-demo">
        <span class="fragment" aria-hidden="true"></span>
        <span class="trial-name">
          <small>Trial I</small>
          <strong>Just Eat</strong>
        </span>
      </button>
      <button class="trial-entry" type="button" data-level-src="Level3_20260607_01493183.mp4" data-level-kicker="Level 3" data-level-title="Utopian City" data-after="mode-select">
        <span class="fragment" aria-hidden="true"></span>
        <span class="trial-name">
          <small>Trial II</small>
          <strong>Utopian City</strong>
        </span>
      </button>
      <button class="trial-entry" type="button" data-level-src="Level2_20260607_01495106.mp4" data-level-kicker="Level 2" data-level-title="Hollow Crypt" data-after="dungeon-demo">
        <span class="fragment" aria-hidden="true"></span>
        <span class="trial-name">
          <small>Trial III</small>
          <strong>Hollow Crypt</strong>
        </span>
      </button>
    </nav>
    <section class="level-player" aria-label="Trial scene player">
      <video class="level-video" muted playsinline preload="auto"></video>
      <div class="level-caption" aria-live="polite">
        <small></small>
        <strong></strong>
      </div>
      <button class="demo-trigger" type="button" aria-label="Enter gameplay demo">
        <span>Demo</span>
      </button>
      <button class="back-to-trials" type="button" aria-label="Back to trial selection">Trials</button>
    </section>
    <section class="mode-select" aria-label="Utopian City mode selection">
      <div class="mode-panel">
        <div class="mode-title">
          <small>Utopian City</small>
          <strong>Select Your Mode</strong>
        </div>
        <div class="mode-options">
          <button class="mode-option" type="button" data-mode-video="Utopian-PC.mp4" data-mode-title="PC Mode" data-control-primary="Move · WASD" data-control-secondary="Camera · Mouse">
            <span class="mode-icon" aria-hidden="true">🖥️</span>
            <strong>PC Mode</strong>
            <small>Keyboard and mouse traversal through the city grid.</small>
          </button>
          <button class="mode-option" type="button" data-mode-video="utopian.mp4" data-mode-title="Gamepad Mode" data-control-primary="Move · Left Stick" data-control-secondary="Camera · Right Stick">
            <span class="mode-icon" aria-hidden="true">🎮</span>
            <strong>Gamepad Mode</strong>
            <small>Controller movement for a smoother cinematic route.</small>
          </button>
        </div>
        <button class="mode-back" type="button">Back to Trials</button>
      </div>
    </section>
    <section class="demo-player" aria-label="Gameplay demo">
      <video class="demo-video" muted playsinline preload="auto" src="Diamond_demo_50_60.mp4"></video>
      <div class="controls-hint" aria-label="Controls">
        <span>Move · WASD</span>
        <span>Camera · Mouse</span>
      </div>
      <button class="demo-back" type="button" aria-label="Back to trial preview">Preview</button>
    </section>
  </main>
  <script>
    const video = document.querySelector(".scene");
    const logoAudio = document.querySelector(".logo-audio");
    const templeAudio = document.querySelector(".temple-audio");
    const runeAudio = document.querySelector(".rune-audio");
    const modeAudio = document.querySelector(".mode-audio");
    const dungeonAudio = document.querySelector(".dungeon-audio");
    const soundGate = document.querySelector(".sound-gate");
    const enterTemple = document.querySelector(".enter-temple");
    const trigger = document.querySelector(".temple-trigger");
    const prophecy = document.querySelector(".prophecy");
    const trialsPanel = document.querySelector(".trials-panel");
    const trialEntries = document.querySelectorAll(".trial-entry");
    const levelPlayer = document.querySelector(".level-player");
    const levelVideo = document.querySelector(".level-video");
    const levelKicker = document.querySelector(".level-caption small");
    const levelTitle = document.querySelector(".level-caption strong");
    const backToTrials = document.querySelector(".back-to-trials");
    const demoTrigger = document.querySelector(".demo-trigger");
    const demoPlayer = document.querySelector(".demo-player");
    const demoVideo = document.querySelector(".demo-video");
    const demoBack = document.querySelector(".demo-back");
    const controlsHintLines = document.querySelectorAll(".controls-hint span");
    const modeSelect = document.querySelector(".mode-select");
    const modeOptions = document.querySelectorAll(".mode-option");
    const modeBack = document.querySelector(".mode-back");
    const stage = document.querySelector(".stage");
    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.has("preview");
    const isModePreview = urlParams.has("modePreview");
    let triggerShown = false;
    let started = false;
    let audioUnlocked = false;
    let currentAfter = "diamond-demo";
    let currentDemoEnd = 60;
    const trialTransitionDelay = 1150;
    const demoStartTime = 50;
    const demoPlaybackRate = 1.45;
    const dungeonPlaybackRate = 1.35;
    const modePlaybackRate = 1.45;
    const dungeonAudioRate = 1;

    logoAudio.volume = 0.82;
    templeAudio.volume = 0.54;
    runeAudio.volume = 0.78;
    modeAudio.volume = 0.58;
    dungeonAudio.volume = 0.36;
    dungeonAudio.playbackRate = dungeonAudioRate;

    const playFromStart = (audio) => {
      audio.currentTime = 0;
      return audio.play().catch(() => {});
    };

    const returnToModeSelect = () => {
      demoPlayer.classList.add("is-fading");
      modeAudio.pause();
      modeAudio.currentTime = 0;

      window.setTimeout(() => {
        demoVideo.pause();
        demoPlayer.classList.remove("is-visible");
        modeSelect.classList.add("is-visible");

        window.setTimeout(() => {
          demoPlayer.classList.remove("is-fading");
        }, 180);
      }, 900);
    };

    const unlockAudio = () => {
      if (audioUnlocked) {
        return;
      }

      audioUnlocked = true;
    };

    const beginExperience = () => {
      unlockAudio();
      soundGate.classList.add("is-hidden");
      document.body.classList.remove("awaiting-start");
      playFromStart(logoAudio);
    };

    enterTemple.addEventListener("click", beginExperience);

    if (isPreview) {
      document.body.classList.add("preview");
    }

    if (isModePreview) {
      soundGate.classList.add("is-hidden");
      document.body.classList.remove("awaiting-start");
      currentAfter = "mode-select";
      modeSelect.classList.add("is-visible");
    }

    const showTrigger = () => {
      if (triggerShown) {
        return;
      }

      triggerShown = true;
      trigger.classList.add("is-ready");
      playFromStart(runeAudio);
    };

    const startScene = () => {
      if (started) {
        return;
      }

      started = true;
      video.currentTime = 0;
      video.play().catch(() => {});
      playFromStart(templeAudio);
    };

    video.addEventListener("loadedmetadata", () => {
      if (!isPreview && Number.isFinite(video.duration) && video.duration > 0) {
        document.documentElement.style.setProperty("--approach-duration", `${video.duration}s`);
      }
    });

    stage.addEventListener("animationend", startScene);

    video.addEventListener("ended", () => {
      video.pause();
      showTrigger();
    });

    if (isPreview) {
      window.setTimeout(showTrigger, 6500);
    }

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && started) {
        video.play().catch(() => {});
      }
    });

    trigger.addEventListener("click", () => {
      trigger.classList.add("is-hidden");
      prophecy.classList.add("is-visible");

      window.setTimeout(() => {
        prophecy.classList.add("is-receding");
      }, 2200);

      window.setTimeout(() => {
        trialsPanel.classList.add("is-visible");
      }, 2850);
    });

    trialEntries.forEach((entry) => {
      entry.addEventListener("click", () => {
        const src = entry.dataset.levelSrc;

        if (!src) {
          return;
        }

        trialsPanel.classList.add("is-leaving");
        prophecy.classList.add("is-receding");
        currentAfter = entry.dataset.after || "diamond-demo";
        levelKicker.textContent = entry.dataset.levelKicker || "";
        levelTitle.textContent = entry.dataset.levelTitle || "";

        window.setTimeout(() => {
          levelVideo.pause();
          levelVideo.src = src;
          levelVideo.currentTime = 0;
          demoTrigger.classList.remove("is-visible");
          demoTrigger.classList.remove("is-cup");
          demoTrigger.querySelector("span").textContent = "Demo";
          modeSelect.classList.remove("is-visible");
          templeAudio.pause();
          levelPlayer.classList.add("is-visible");
          levelVideo.play().catch(() => {});
        }, trialTransitionDelay);
      });
    });

    levelVideo.addEventListener("ended", () => {
      if (currentAfter === "mode-select") {
        levelPlayer.classList.remove("is-visible");
        modeSelect.classList.add("is-visible");
        return;
      }

      if (currentAfter === "dungeon-demo") {
        demoTrigger.classList.add("is-cup");
        demoTrigger.querySelector("span").textContent = "Demo";
      } else {
        demoTrigger.classList.remove("is-cup");
        demoTrigger.querySelector("span").textContent = "Demo";
      }

      demoTrigger.classList.add("is-visible");
    });

    demoTrigger.addEventListener("click", () => {
      demoTrigger.classList.remove("is-visible");
      demoPlayer.classList.remove("is-fading");

      window.setTimeout(() => {
        levelVideo.pause();
        if (currentAfter === "dungeon-demo") {
          demoVideo.src = "Dungeon.mp4";
          demoVideo.playbackRate = dungeonPlaybackRate;
          currentDemoEnd = null;
          controlsHintLines[0].textContent = "Move · WASD";
          controlsHintLines[1].textContent = "Camera · Mouse";
          demoVideo.currentTime = 0;
          playFromStart(dungeonAudio);
        } else {
          demoVideo.src = "Diamond_demo_50_60.mp4";
          demoVideo.playbackRate = demoPlaybackRate;
          currentDemoEnd = 10;
          controlsHintLines[0].textContent = "Move · WASD";
          controlsHintLines[1].textContent = "Camera · Mouse";
          demoVideo.currentTime = 0;
        }
        demoPlayer.classList.add("is-visible");
        demoVideo.play().catch(() => {});
      }, trialTransitionDelay);
    });

    modeOptions.forEach((option) => {
      option.addEventListener("click", () => {
        const src = option.dataset.modeVideo;

        if (!src) {
          return;
        }

        modeSelect.classList.remove("is-visible");
        demoPlayer.classList.remove("is-fading");
        controlsHintLines[0].textContent = option.dataset.controlPrimary || "";
        controlsHintLines[1].textContent = option.dataset.controlSecondary || "";

        window.setTimeout(() => {
          demoVideo.pause();
          demoVideo.src = src;
          demoVideo.playbackRate = modePlaybackRate;
          currentDemoEnd = null;
          demoVideo.currentTime = 0;
          demoPlayer.classList.add("is-visible");
          playFromStart(modeAudio);
          demoVideo.play().catch(() => {});
        }, trialTransitionDelay);
      });
    });

    demoVideo.addEventListener("timeupdate", () => {
      if (!currentDemoEnd) {
        return;
      }

      if (demoVideo.currentTime >= currentDemoEnd - 1.1) {
        demoPlayer.classList.add("is-fading");
      }

      if (demoVideo.currentTime >= currentDemoEnd) {
        demoVideo.pause();
      }
    });

    demoVideo.addEventListener("ended", () => {
      if (currentAfter === "dungeon-demo") {
        dungeonAudio.pause();
        dungeonAudio.currentTime = 0;
        return;
      }

      if (currentAfter !== "mode-select") {
        return;
      }

      returnToModeSelect();
    });

    demoBack.addEventListener("click", () => {
      if (currentAfter === "mode-select") {
        returnToModeSelect();
        return;
      }

      demoVideo.pause();
      dungeonAudio.pause();
      dungeonAudio.currentTime = 0;
      demoPlayer.classList.remove("is-fading");
      demoPlayer.classList.remove("is-visible");
      levelPlayer.classList.add("is-visible");
      demoTrigger.classList.add("is-visible");
    });

    modeBack.addEventListener("click", () => {
      modeAudio.pause();
      modeAudio.currentTime = 0;
      modeSelect.classList.remove("is-visible");
      templeAudio.play().catch(() => {});
      trialsPanel.classList.remove("is-leaving");
      trialsPanel.classList.add("is-visible");
      prophecy.classList.add("is-receding");
    });

    backToTrials.addEventListener("click", () => {
      levelVideo.pause();
      demoVideo.pause();
      modeAudio.pause();
      modeAudio.currentTime = 0;
      dungeonAudio.pause();
      dungeonAudio.currentTime = 0;
      demoPlayer.classList.remove("is-fading");
      demoPlayer.classList.remove("is-visible");
      demoTrigger.classList.remove("is-visible");
      modeSelect.classList.remove("is-visible");
      templeAudio.play().catch(() => {});
      levelPlayer.classList.remove("is-visible");
      trialsPanel.classList.remove("is-leaving");
      trialsPanel.classList.add("is-visible");
      prophecy.classList.add("is-receding");
    });
  </script>
</body>
</html>
